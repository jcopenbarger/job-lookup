<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CCS Job Lookup</title>
  <script src="https://alcdn.msauth.net/browser/2.38.0/js/msal-browser.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f4f6; color: #1a1a1a; min-height: 100vh; }

    .top-header { background: #3b1f5e; padding: 14px 1.5rem; display: flex; align-items: center; gap: 16px; }
    .logo-box { background: #fff; border-radius: 8px; padding: 6px 12px; display: flex; align-items: center; }
    .top-header img { height: 38px; width: auto; display: block; }
    .top-header-title { color: #fff; font-size: 18px; font-weight: 500; letter-spacing: 0.01em; }

    .app { padding: 1.5rem; max-width: 960px; margin: 0 auto; }

    .search-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .search-wrap { flex: 1; min-width: 200px; }
    .search-wrap input { width: 100%; font-size: 15px; padding: 10px 14px; border-radius: 8px; border: 1.5px solid #d0d0d0; background: #fff; color: #1a1a1a; outline: none; transition: border-color 0.15s; }
    .search-wrap input:focus { border-color: #3b1f5e; box-shadow: 0 0 0 3px rgba(59,31,94,0.1); }
    .results-count { font-size: 13px; color: #888; white-space: nowrap; }
    .refresh-btn { padding: 9px 18px; border-radius: 8px; border: 1.5px solid #3b1f5e; background: #fff; color: #3b1f5e; font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 6px; transition: background 0.15s; }
    .refresh-btn:hover { background: #f0eaf8; }
    .refresh-btn:disabled { opacity: 0.6; cursor: default; }
    .refresh-btn.spinning .icon { display: inline-block; animation: spin 0.8s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .status-bar { font-size: 12px; color: #888; margin-bottom: 1.25rem; min-height: 18px; }
    .error-msg { background: #fff0f0; color: #a32d2d; border-radius: 8px; padding: 10px 14px; font-size: 14px; margin-bottom: 1rem; border: 1px solid #f09595; }

    .login-card { background: #fff; border-radius: 12px; border: 1.5px solid #e0e0e0; padding: 2rem; text-align: center; margin-top: 2rem; }
    .login-card p { color: #666; margin-bottom: 1.25rem; font-size: 15px; }
    .login-btn { padding: 10px 24px; border-radius: 8px; border: none; background: #3b1f5e; color: #fff; font-size: 15px; font-weight: 500; cursor: pointer; }
    .login-btn:hover { background: #2d1748; }

    .customer-card { background: #fff; border-radius: 12px; border: 1.5px solid #e0e0e0; margin-bottom: 10px; overflow: hidden; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; }
    .customer-card:hover { border-color: #8a6aad; }
    .customer-card.expanded { border-color: #3b1f5e; box-shadow: 0 2px 12px rgba(59,31,94,0.1); }

    .customer-header { display: flex; align-items: center; gap: 14px; padding: 1rem 1.25rem; }
    .customer-avatar { width: 42px; height: 42px; min-width: 42px; border-radius: 50%; background: #ede6f5; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; color: #3b1f5e; }
    .customer-info { flex: 1; min-width: 0; }
    .customer-name { font-size: 15px; font-weight: 600; color: #1a1a1a; }
    .job-count-badge { background: #a8b832; color: #2e3300; font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 20px; white-space: nowrap; }
    .chevron { font-size: 18px; color: #aaa; margin-left: 8px; transition: transform 0.2s; display: inline-block; line-height: 1; }
    .customer-card.expanded .chevron { transform: rotate(90deg); }

    .customer-details { display: none; border-top: 1px solid #f0f0f0; padding: 1rem 1.25rem; background: #faf9fc; }
    .customer-card.expanded .customer-details { display: block; }

    .jobs-section-label { font-size: 11px; color: #888; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.07em; font-weight: 600; }
    .jobs-grid { display: flex; flex-direction: column; gap: 8px; }

    .job-row { display: flex; align-items: center; gap: 12px; background: #fff; border-radius: 8px; padding: 10px 14px; border: 1px solid #e8e8e8; }
    .job-row.sla { background: #fff8e6; border-color: #e8c84a; }

    .job-num-pill { background: #ede6f5; color: #3b1f5e; font-size: 13px; font-weight: 600; padding: 4px 12px; border-radius: 20px; white-space: nowrap; }
    .job-row.sla .job-num-pill { background: #a8b832; color: #2e3300; }

    .sla-badge { font-size: 11px; font-weight: 700; color: #7a6000; background: #fff0a0; border: 1px solid #e8c84a; padding: 2px 8px; border-radius: 20px; white-space: nowrap; letter-spacing: 0.04em; }
    .sla-expiry { font-size: 13px; color: #7a6000; margin-left: auto; white-space: nowrap; }
    .sla-expiry.expired { color: #a32d2d; font-weight: 600; }
    .sla-expiry.soon { color: #c17600; font-weight: 600; }

    .no-results { text-align: center; padding: 3rem; color: #888; font-size: 15px; }
    .loading { text-align: center; padding: 3rem; color: #888; font-size: 15px; }
  </style>
</head>
<body>

  <div class="top-header">
    <div class="logo-box">
      <img src="https://ccsmidwest.com/wp-content/uploads/2021/09/ccs-presentation-systems-logo.png" alt="CCS Presentation Systems" onerror="this.style.display='none'" />
    </div>
    <span class="top-header-title">Job Lookup</span>
  </div>

  <div class="app">
    <div class="search-bar">
      <div class="search-wrap">
        <input type="text" id="search-input" placeholder="Search by customer or job number..." oninput="filterCustomers()" />
      </div>
      <span class="results-count" id="results-count"></span>
      <button class="refresh-btn" id="refresh-btn" onclick="loadData()">
        <span class="icon">↻</span> Refresh
      </button>
    </div>
    <div class="status-bar" id="status-bar"></div>
    <div id="error-display"></div>
    <div id="customer-list"><div class="loading">Signing in...</div></div>
  </div>

  <script>
    const CLIENT_ID = '28cc27cd-1e47-41c0-b67c-93271376dfbb';
    const TENANT_ID = '921b0b37-2a85-47bc-a179-598b0dea97f1';
    const FILE_ID = '1feb9a69-dc0f-4079-861d-8f36f50e7fa3';
    const SHAREPOINT_HOST = 'ccssouthwest-my.sharepoint.com';
    const USER_PATH = 'personal/jcopenbarger_ccsprojects_com';
    const SHEET_NAME = 'Sheet1';
    const SCOPES = ['Files.Read', 'User.Read'];

    const msalConfig = {
      auth: {
        clientId: CLIENT_ID,
        authority: 'https://login.microsoftonline.com/' + TENANT_ID,
        redirectUri: window.location.origin + window.location.pathname
      },
      cache: { cacheLocation: 'sessionStorage', storeAuthStateInCookie: false }
    };

    const msalInstance = new msal.PublicClientApplication(msalConfig);
    let allCustomers = [];
    let expandedKey = null;

    async function init() {
      try {
        const accounts = msalInstance.getAllAccounts();
        if (accounts.length === 0) {
          showLoginPrompt();
        } else {
          msalInstance.setActiveAccount(accounts[0]);
          await loadData();
        }
      } catch(e) {
        showError('Sign in error: ' + e.message);
      }
    }

    function showLoginPrompt() {
      document.getElementById('customer-list').innerHTML =
        '<div class="login-card"><p>Sign in with your Microsoft account to view job data.</p>' +
        '<button class="login-btn" onclick="signIn()">Sign in with Microsoft</button></div>';
      document.getElementById('status-bar').textContent = '';
      document.getElementById('results-count').textContent = '';
    }

    async function signIn() {
      try {
        const response = await msalInstance.loginPopup({ scopes: SCOPES });
        msalInstance.setActiveAccount(response.account);
        await loadData();
      } catch(e) {
        showError('Sign in failed: ' + e.message);
      }
    }

    async function getToken() {
      const account = msalInstance.getActiveAccount();
      if (!account) throw new Error('No active account');
      try {
        const result = await msalInstance.acquireTokenSilent({ scopes: SCOPES, account });
        return result.accessToken;
      } catch(e) {
        const result = await msalInstance.acquireTokenPopup({ scopes: SCOPES });
        return result.accessToken;
      }
    }

    async function loadData() {
      const btn = document.getElementById('refresh-btn');
      btn.classList.add('spinning');
      btn.disabled = true;
      document.getElementById('error-display').innerHTML = '';
      document.getElementById('status-bar').textContent = 'Loading...';
      document.getElementById('customer-list').innerHTML = '<div class="loading">Loading jobs...</div>';
      try {
        const token = await getToken();
        const url = 'https://graph.microsoft.com/v1.0/me/drive/items/' + FILE_ID + '/workbook/worksheets/' + SHEET_NAME + '/usedRange';
        const res = await fetch(url, { headers: { Authorization: 'Bearer ' + token } });
        if (!res.ok) {
          const e = await res.json();
          throw new Error('Graph error: ' + (e.error && e.error.message ? e.error.message : res.status));
        }
        const data = await res.json();
        const rows = data.values;
        if (!rows || rows.length < 2) {
          document.getElementById('customer-list').innerHTML = '<div class="no-results">No records found — add some data to your Excel file</div>';
          document.getElementById('status-bar').textContent = 'Connected — spreadsheet is empty';
          return;
        }

        const headers = rows[0].map(h => (h || '').toString().trim().toLowerCase());
        const colCustomer = headers.indexOf('customers');
        const colJobNum = headers.indexOf('job numbers');
        const colSla = headers.indexOf('sla');
        const colExpiry = headers.indexOf('sla expiration date');

        const raw = rows.slice(1).filter(r => r[colCustomer] || r[colJobNum]).map(r => ({
          customer: (r[colCustomer] || '').toString().trim(),
          jobNum: (r[colJobNum] || '').toString().trim(),
          sla: r[colSla] === true || (r[colSla] || '').toString().toLowerCase() === 'true',
          slaExpiry: r[colExpiry] || null
        }));

        allCustomers = groupByCustomer(raw);
        const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        document.getElementById('status-bar').textContent = 'Last updated ' + now + ' · ' + allCustomers.length + ' customer' + (allCustomers.length !== 1 ? 's' : '');
        filterCustomers();
      } catch(e) {
        showError(e.message);
        document.getElementById('status-bar').textContent = 'Failed to load — tap Refresh to try again';
        document.getElementById('customer-list').innerHTML = '';
      } finally {
        btn.classList.remove('spinning');
        btn.disabled = false;
      }
    }

    function groupByCustomer(records) {
      const map = {};
      records.forEach(r => {
        const key = r.customer || 'Unknown';
        if (!map[key]) map[key] = { customer: key, jobs: [] };
        if (r.jobNum) map[key].jobs.push({ jobNum: r.jobNum, sla: r.sla, slaExpiry: r.slaExpiry });
      });
      const customers = Object.values(map).sort((a, b) => a.customer.localeCompare(b.customer));
      customers.forEach(c => c.jobs.sort((a, b) => (b.sla ? 1 : 0) - (a.sla ? 1 : 0)));
      return customers;
    }

    function excelDateToJS(val) {
      if (!val) return null;
      if (typeof val === 'number') {
        const d = new Date(Date.UTC(1899, 11, 30));
        d.setUTCDate(d.getUTCDate() + Math.floor(val));
        return d;
      }
      const d = new Date(val);
      return isNaN(d) ? null : d;
    }

    function slaStatus(expiryVal) {
      if (!expiryVal) return null;
      const expiry = excelDateToJS(expiryVal);
      if (!expiry) return null;
      const now = new Date();
      const diffDays = Math.ceil((expiry - now) / (1000 * 60 * 60 * 24));
      if (diffDays < 0) return { label: 'Expired', cls: 'expired' };
      if (diffDays <= 30) return { label: 'Expires in ' + diffDays + 'd', cls: 'soon' };
      return { label: 'Expires ' + expiry.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }), cls: '' };
    }

    function filterCustomers() {
      const q = document.getElementById('search-input').value.toLowerCase();
      const filtered = !q ? allCustomers : allCustomers.filter(c =>
        c.customer.toLowerCase().includes(q) ||
        c.jobs.some(j => j.jobNum.toLowerCase().includes(q))
      );
      updateCount(filtered.length, allCustomers.length);
      renderCustomers(filtered);
    }

    function updateCount(shown, total) {
      document.getElementById('results-count').textContent = shown === total ? total + ' customers' : shown + ' of ' + total;
    }

    function toggleCard(key) {
      expandedKey = expandedKey === key ? null : key;
      document.querySelectorAll('.customer-card').forEach(c => {
        c.classList.toggle('expanded', c.dataset.key === expandedKey);
      });
    }

    function initials(name) {
      return name.split(' ').slice(0, 2).map(w => w[0] || '').join('').toUpperCase();
    }

    function renderCustomers(customers) {
      const list = document.getElementById('customer-list');
      if (!customers.length) { list.innerHTML = '<div class="no-results">No customers found</div>'; return; }
      list.innerHTML = customers.map(c => {
        const key = c.customer;
        const isExp = expandedKey === key;
        const slaCount = c.jobs.filter(j => j.sla).length;
        return '<div class="customer-card ' + (isExp ? 'expanded' : '') + '" data-key="' + key + '" onclick="toggleCard(\'' + key.replace(/'/g, "\\'") + '\')">' +
          '<div class="customer-header">' +
            '<div class="customer-avatar">' + initials(c.customer) + '</div>' +
            '<div class="customer-info"><div class="customer-name">' + c.customer + '</div></div>' +
            (slaCount > 0 ? '<span class="sla-badge">SLA</span>' : '') +
            '<span class="job-count-badge">' + c.jobs.length + ' job' + (c.jobs.length !== 1 ? 's' : '') + '</span>' +
            '<span class="chevron">›</span>' +
          '</div>' +
          '<div class="customer-details">' +
            '<div class="jobs-section-label">Job numbers</div>' +
            '<div class="jobs-grid">' +
              c.jobs.map(j => {
                const status = j.sla ? slaStatus(j.slaExpiry) : null;
                return '<div class="job-row ' + (j.sla ? 'sla' : '') + '">' +
                  '<span class="job-num-pill">' + j.jobNum + '</span>' +
                  (j.sla ? '<span class="sla-badge">SLA</span>' : '') +
                  (status ? '<span class="sla-expiry ' + status.cls + '">' + status.label + '</span>' : '') +
                  '</div>';
              }).join('') +
            '</div>' +
          '</div>' +
        '</div>';
      }).join('');
    }

    function showError(msg) {
      document.getElementById('error-display').innerHTML = '<div class="error-msg">' + msg + '</div>';
    }

    let idleTimer;
    const IDLE_TIMEOUT = 5 * 60 * 1000;
    function resetIdleTimer() {
      clearTimeout(idleTimer);
      idleTimer = setTimeout(function() { loadData(); }, IDLE_TIMEOUT);
    }
    ['touchstart', 'touchend', 'mousemove', 'mousedown', 'keydown', 'scroll'].forEach(function(evt) {
      document.addEventListener(evt, resetIdleTimer, true);
    });
    resetIdleTimer();

    init();
  </script>
</body>
</html>
